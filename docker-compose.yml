services:
  mysql:
    image: mysql:8.0
    container_name: swyp-mysql
    ports:
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: swyp
      MYSQL_USER: swyp
      MYSQL_PASSWORD: swyp1234
    volumes:
      - swyp-mysql-data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: swyp-redis
    ports:
      - "16379:6379"
    environment:
      - REDIS_HOST=localhost
      - REDIS_PASSWORD=swyp1234
    command:
      - /bin/sh
      - -c
      - redis-server --requirepass "$${REDIS_PASSWORD:?REDIS_PASSWORD variable is not set}"

volumes:
  swyp-mysql-data: