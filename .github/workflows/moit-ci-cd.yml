name: moit CI/CD
on:
  push:
    branches:
      - develop
jobs:
  build_and_push:
    name: Push to NCP container registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build jar
        run: ./gradlew bootJar

      - name: Login to NCP Registry
        run: |
          docker login \
            -u ${{ secrets.NCP_ACCESS_KEY }} \
            -p ${{ secrets.NCP_SECRET_KEY }} \
            ${{ secrets.NCP_REGISTRY_NAME }}.kr.ncr.ntruss.com

      - name: Docker build
        run: |
          docker build \
            -t ${{ secrets.NCP_REGISTRY_NAME }}.kr.ncr.ntruss.com/${{ secrets.DOCKER_IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ secrets.NCP_REGISTRY_NAME }}.kr.ncr.ntruss.com/${{ secrets.DOCKER_IMAGE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.NCP_REGISTRY_NAME }}.kr.ncr.ntruss.com/${{ secrets.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.NCP_REGISTRY_NAME }}.kr.ncr.ntruss.com/${{ secrets.DOCKER_IMAGE_NAME }}:latest

  deploy:
    name: Connect server ssh and pull
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to NCP Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.NCP_SERVER_HOST }}
          username: ${{ secrets.NCP_SERVER_USER }}
          key: ${{ secrets.NCP_SERVER_PASSWORD }}
          port: ${{  secrets.SSH_PORT }}
          script: |
            docker login \
              -u ${{ secrets.NCP_ACCESS_KEY }} \
              -p ${{ secrets.NCP_SECRET_KEY }} \
              ${{ secrets.NCP_REGISTRY_NAME }}.kr.ncr.ntruss.com
            
            cd /root/moit
            docker compose pull
            docker compose up -d --force-recreate